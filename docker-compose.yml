services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234abcd
      MYSQL_DATABASE: warehouse
      MYSQL_USER: warehouse_user
      MYSQL_PASSWORD: 1234abcd
    ports:
      - "3310:3310"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6378:6378"
    volumes:
      - redis_data:/data

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      TZ: Asia/Jakarta
      DATABASE_URL: mysql://warehouse_user:1234abcd@db:3310/warehouse
      REDIS_URL: redis://redis:6378
      NODE_ENV: production
      MAIL_RESEND_API_KEY: ${MAIL_RESEND_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public
    command: >
      sh -c "sleep 10 &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             node dist/server.js"
    restart: always

volumes:
  db_data:
  redis_data: